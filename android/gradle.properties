org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Some plugins (e.g. photo_manager) let Kotlin default to the JDK's JVM target
# (21) while Flutter pins Java to 17, which trips Gradle's strict cross-task
# check. Relax it to a warning; D8/R8 dexes the mixed targets fine.
kotlin.jvm.target.validation.mode=warning
